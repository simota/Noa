[package]
name = "noa"
edition.workspace = true
version.workspace = true
license.workspace = true

[[bin]]
name = "noa"
path = "src/main.rs"

[dependencies]
noa-app.workspace = true
clap.workspace = true
anyhow.workspace = true
env_logger.workspace = true

# Optional: `cargo bundle` reads this. The supported, dependency-free path is
# `scripts/bundle-macos.sh`; this block just makes cargo-bundle work too.
[package.metadata.bundle]
name = "noa"
identifier = "com.simota.noa"
category = "public.app-category.developer-tools"
short_description = "A faithful Rust clone of the Ghostty terminal emulator."
icon = ["../../assets/noa.icns"]
