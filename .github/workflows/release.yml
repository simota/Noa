name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build macOS arm64 app
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          workspace_version="$(
            awk '
              /^\[workspace\.package\]$/ { found = 1; next }
              /^\[/ { found = 0 }
              found && /^version[[:space:]]*=/ {
                value = $0
                sub(/^[^"]*"/, "", value)
                sub(/".*$/, "", value)
                print value
                exit
              }
            ' Cargo.toml
          )"
          cask_version="$(
            awk '/^[[:space:]]+version "/ {
              value = $2
              gsub(/"/, "", value)
              print value
              exit
            }' Casks/noa.rb
          )"
          if [[ "${GITHUB_REF_NAME}" != "v${workspace_version}" ]]; then
            echo "Tag must be v${workspace_version}; got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          if [[ "${cask_version}" != "${workspace_version}" ]]; then
            echo "Cask version must be ${workspace_version}; got ${cask_version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Determine signing mode
        id: signing
        shell: bash
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          # Secrets cannot be referenced in step-level `if:`, so resolve the
          # decision once here and gate later steps on this output. Forks and
          # secret-less runs take the ad-hoc path (identical to prior behavior).
          if [[ -n "${MACOS_SIGN_IDENTITY}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "Developer ID signing enabled."
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "MACOS_SIGN_IDENTITY not set; falling back to ad-hoc signing (no notarization)."
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          keychain_password="$(uuidgen)"
          keychain="${RUNNER_TEMP}/noa-signing.keychain-db"
          cert_path="${RUNNER_TEMP}/certificate.p12"
          printf '%s' "${MACOS_CERTIFICATE_P12}" | base64 --decode > "${cert_path}"
          security create-keychain -p "${keychain_password}" "${keychain}"
          # Prevent the keychain from auto-locking mid-build (6 h timeout).
          security set-keychain-settings -lut 21600 "${keychain}"
          security unlock-keychain -p "${keychain_password}" "${keychain}"
          security import "${cert_path}" -k "${keychain}" \
            -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "${keychain_password}" "${keychain}"
          # Prepend our keychain to the user search list, keeping the existing
          # keychains reachable, and make it the default for codesign lookups.
          security list-keychains -d user -s "${keychain}" \
            $(security list-keychains -d user | sed 's/["[:space:]]//g')
          security default-keychain -s "${keychain}"
          rm -f "${cert_path}"
          echo "NOA_SIGNING_KEYCHAIN=${keychain}" >> "${GITHUB_ENV}"

      - name: Build app bundle
        env:
          NOA_VERSION: ${{ steps.version.outputs.version }}
          NOA_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: scripts/bundle-macos.sh release

      - name: Verify app bundle
        shell: bash
        run: |
          set -euo pipefail
          app="target/release/Noa.app"
          plutil -lint "${app}/Contents/Info.plist"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "${app}/Contents/Info.plist")" = \
            "${{ steps.version.outputs.version }}"
          file "${app}/Contents/MacOS/Noa" | grep -q "arm64"
          codesign --verify --deep --strict --verbose=2 "${app}"

      - name: Notarize and staple
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          app="target/release/Noa.app"
          key_path="${RUNNER_TEMP}/AuthKey.p8"
          # The App Store Connect key may be stored raw (PEM) or base64-encoded.
          if printf '%s' "${APPLE_API_KEY}" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s\n' "${APPLE_API_KEY}" > "${key_path}"
          else
            printf '%s' "${APPLE_API_KEY}" | base64 --decode > "${key_path}"
          fi
          notarize_zip="${RUNNER_TEMP}/Noa-notarize.zip"
          # notarytool wants a zip; keepParent preserves the .app directory.
          ditto -c -k --keepParent "${app}" "${notarize_zip}"
          xcrun notarytool submit "${notarize_zip}" \
            --key "${key_path}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER_ID}" \
            --wait
          # Staple the ticket into the .app so Gatekeeper validates offline.
          xcrun stapler staple "${app}"
          rm -f "${key_path}" "${notarize_zip}"
          # Final gate: confirm Gatekeeper accepts the signed, stapled bundle.
          spctl -a -t exec -vv "${app}"

      - name: Package release asset
        id: package
        shell: bash
        run: |
          set -euo pipefail
          archive="Noa-${{ steps.version.outputs.version }}-macos-arm64.zip"
          find target/release/Noa.app -exec touch -t 198001010000 {} +
          (
            cd target/release
            find Noa.app -print | LC_ALL=C sort |
              zip -X -q "${GITHUB_WORKSPACE}/${archive}" -@
          )
          unzip -Z1 "${archive}" | grep -qx "Noa.app/Contents/MacOS/Noa"
          shasum -a 256 "${archive}" > "${archive}.sha256"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: noa-macos-arm64
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          if-no-files-found: error

      - name: Clean up signing keychain
        if: always() && steps.signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${NOA_SIGNING_KEYCHAIN:-}" && -f "${NOA_SIGNING_KEYCHAIN}" ]]; then
            security delete-keychain "${NOA_SIGNING_KEYCHAIN}" || true
          fi

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: noa-macos-arm64
          path: release-assets

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${TAG}" release-assets/* \
            --verify-tag --generate-notes --repo "${GITHUB_REPOSITORY}"
